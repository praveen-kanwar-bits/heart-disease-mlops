version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: hd-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: hd-grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
